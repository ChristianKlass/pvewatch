image: python:3.12-slim

stages:
  - lint
  - test
  - docker

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_IMAGE: "ghcr.io/markklass/pvewatch"

cache:
  paths:
    - .cache/pip

before_script:
  - pip install --quiet --break-system-packages -e ".[dev]" || pip install --quiet --break-system-packages -e . pytest ruff

lint:
  stage: lint
  script:
    - ruff check src/ tests/
    - ruff format --check src/ tests/

test:
  stage: test
  script:
    - python -m pytest tests/ -v

docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  before_script:
    - echo "$GHCR_TOKEN" | docker login ghcr.io -u markklass --password-stdin
  script:
    - |
      docker buildx create --use
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --tag "${DOCKER_IMAGE}:${CI_COMMIT_TAG}" \
        --tag "${DOCKER_IMAGE}:latest" \
        --push \
        .
