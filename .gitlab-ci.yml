image: python:3.12

stages:
  - lint
  - test
  - sonarqube
  - docker
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

before_script:
  - pip install --quiet -e ".[dev]" || pip install --quiet -e . pytest ruff

lint:
  stage: lint
  script:
    - ruff check src/ tests/
    - ruff format --check src/ tests/

test:
  stage: test
  script:
    - python -m pytest tests/ -v --cov=pvewatch --cov-report=xml:coverage.xml
  artifacts:
    paths:
      - coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

sonarqube:
  stage: sonarqube
  before_script: []
  dependencies:
    - test
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  only:
    - merge_requests
    - main

# Push every commit to the GitLab Container Registry using CI_JOB_TOKEN (no credentials needed)
docker-dev:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - echo "$CI_JOB_TOKEN" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE:dev" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:dev"

deploy:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  before_script: []
  needs:
    - docker-dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  environment:
    name: production
    kubernetes:
      agent: homelab/infra:homelab
  script:
    # Apply namespace, configmap, and service (idempotent)
    - kubectl apply -f k8s/namespace.yaml
    - kubectl apply -f k8s/configmap.yaml
    - kubectl apply -f k8s/service.yaml
    # Create/update imagePullSecret from a GitLab deploy token stored as CI variables
    # (GITLAB_DEPLOY_TOKEN_USER / GITLAB_DEPLOY_TOKEN_TOKEN — read_registry scope)
    - |
      kubectl create secret docker-registry gitlab-registry \
        --namespace=pvewatch \
        --docker-server="$CI_REGISTRY" \
        --docker-username="$GITLAB_DEPLOY_TOKEN_USER" \
        --docker-password="$GITLAB_DEPLOY_TOKEN_TOKEN" \
        --dry-run=client -o yaml | kubectl apply -f -
    # Create/update secret from GitLab CI masked variables
    - |
      kubectl create secret generic pvewatch-secrets \
        --namespace=pvewatch \
        --from-literal=PVE_HOST="$PVE_HOST" \
        --from-literal=PVE_NODE="$PVE_NODE" \
        --from-literal=PVE_TOKEN_ID="$PVE_TOKEN_ID" \
        --from-literal=PVE_TOKEN_SECRET="$PVE_TOKEN_SECRET" \
        --from-literal=DATABASE_URL="$DATABASE_URL" \
        --from-literal=ALERT_EMAIL_SMTP_HOST="$ALERT_EMAIL_SMTP_HOST" \
        --from-literal=ALERT_EMAIL_SMTP_PORT="$ALERT_EMAIL_SMTP_PORT" \
        --from-literal=ALERT_EMAIL_SMTP_USER="$ALERT_EMAIL_SMTP_USER" \
        --from-literal=ALERT_EMAIL_SMTP_PASS="$ALERT_EMAIL_SMTP_PASS" \
        --from-literal=ALERT_EMAIL_TO="$ALERT_EMAIL_TO" \
        --from-literal=ALERT_EMAIL_FROM="$ALERT_EMAIL_FROM" \
        --dry-run=client -o yaml | kubectl apply -f -
    # Inject the image and apply the deployment
    - sed "s|IMAGE_TAG|$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA|g" k8s/deployment.yaml | kubectl apply -f -
    - kubectl rollout status deployment/pvewatch --namespace=pvewatch --timeout=120s

# Push release tags to Docker Hub for public distribution
docker-release:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - |
      docker buildx create --use
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --tag "pvewatch/pvewatch:${CI_COMMIT_TAG}" \
        --tag "pvewatch/pvewatch:latest" \
        --push \
        .
