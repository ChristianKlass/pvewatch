image: python:3.12-slim

stages:
  - lint
  - test
  - docker

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

before_script:
  - pip install --quiet --break-system-packages -e ".[dev]" || pip install --quiet --break-system-packages -e . pytest ruff

lint:
  stage: lint
  script:
    - ruff check src/ tests/
    - ruff format --check src/ tests/

test:
  stage: test
  script:
    - python -m pytest tests/ -v

# Push every commit to the GitLab Container Registry using CI_JOB_TOKEN (no credentials needed)
docker-dev:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - echo "$CI_JOB_TOKEN" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE:dev" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:dev"

# Push release tags to Docker Hub for public distribution
docker-release:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - |
      docker buildx create --use
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --tag "pvewatch/pvewatch:${CI_COMMIT_TAG}" \
        --tag "pvewatch/pvewatch:latest" \
        --push \
        .
